<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Random Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #111827;
        background: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.16), transparent 35%),
          #f8fafc;
      }

      .shell {
        width: min(100%, 560px);
        margin: 24px;
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        display: grid;
        gap: 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #475569;
      }

      .avatar-card {
        display: grid;
        place-items: center;
        min-height: 280px;
        border-radius: 20px;
        background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
        border: 1px solid rgba(59, 130, 246, 0.16);
      }

      #avatar img {
        display: block;
        width: min(100%, 240px);
        height: auto;
        image-rendering: pixelated;
        filter: drop-shadow(0 20px 32px rgba(37, 99, 235, 0.18));
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .seed {
        font-size: 14px;
        color: #475569;
        word-break: break-all;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        cursor: pointer;
        box-shadow: 0 12px 32px rgba(37, 99, 235, 0.28);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>随机 Avatar 展示</h1>
        <p>打开页面会先展示一个 avatar，点击按钮就再随机生成一个新的。</p>
      </header>

      <section class="avatar-card">
        <div id="avatar">Generating avatar…</div>
      </section>

      <div class="toolbar">
        <div class="seed">当前 seed：<span id="seed-value">-</span></div>
        <button id="random-button" type="button">随机展示一下</button>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

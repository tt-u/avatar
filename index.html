<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Avatar</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090f;
        --bg-soft: #11131d;
        --panel: rgba(17, 19, 29, 0.88);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f4f7ff;
        --muted: rgba(244, 247, 255, 0.7);
        --pink: #ff4fa3;
        --cyan: #2ef2ff;
        --yellow: #ffd447;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 79, 163, 0.16), transparent 28%),
          radial-gradient(circle at 80% 30%, rgba(46, 242, 255, 0.16), transparent 24%),
          radial-gradient(circle at 50% 100%, rgba(255, 212, 71, 0.08), transparent 30%),
          linear-gradient(180deg, #080910 0%, #0b0d14 100%);
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.35;
      }

      .page {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
        overflow: hidden;
      }

      .orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(70px);
        opacity: 0.5;
        pointer-events: none;
        width: 280px;
        height: 280px;
      }

      .orb.orb-a {
        top: -60px;
        left: -40px;
        background: rgba(255, 79, 163, 0.28);
      }

      .orb.orb-b {
        right: -80px;
        bottom: -50px;
        background: rgba(46, 242, 255, 0.22);
      }

      .pixel-field {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .pixel {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        opacity: 0.35;
        animation: float 11s ease-in-out infinite;
      }

      .pixel:nth-child(3n) { background: rgba(255, 79, 163, 0.8); }
      .pixel:nth-child(3n + 1) { background: rgba(46, 242, 255, 0.8); }
      .pixel:nth-child(3n + 2) { background: rgba(255, 212, 71, 0.85); }

      .shell {
        position: relative;
        z-index: 1;
        width: min(100%, 760px);
        display: grid;
        gap: 28px;
        text-align: center;
      }

      .hero {
        display: grid;
        gap: 8px;
        justify-items: center;
      }

      .title {
        margin: 0;
        font-size: clamp(42px, 8vw, 88px);
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        line-height: 0.92;
        text-shadow:
          0 0 18px rgba(255, 79, 163, 0.45),
          0 0 36px rgba(46, 242, 255, 0.2);
      }

      .title span {
        position: relative;
        display: inline-block;
      }

      .title span::before,
      .title span::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .title span::before {
        transform: translate(-2px, 0);
        color: rgba(255, 79, 163, 0.85);
        clip-path: inset(0 0 48% 0);
      }

      .title span::after {
        transform: translate(2px, 0);
        color: rgba(46, 242, 255, 0.85);
        clip-path: inset(52% 0 0 0);
      }

      .panel {
        margin: 0 auto;
        width: min(100%, 420px);
        padding: 24px;
        border-radius: 28px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow:
          0 28px 90px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 0 50px rgba(255, 79, 163, 0.08);
        backdrop-filter: blur(22px);
      }

      .avatar-card {
        position: relative;
        min-height: 320px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        overflow: hidden;
        border: 2px solid rgba(255, 79, 163, 0.22);
        background:
          linear-gradient(180deg, rgba(255, 79, 163, 0.08), transparent),
          linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(46, 242, 255, 0.06));
        box-shadow: 0 0 60px rgba(255, 79, 163, 0.12);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .avatar-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03) 0 2px,
          transparent 2px 6px
        );
        opacity: 0.35;
        pointer-events: none;
      }

      .avatar-card.is-generating {
        animation: card-glitch 520ms ease;
        border-color: rgba(46, 242, 255, 0.48);
        box-shadow:
          0 0 0 1px rgba(46, 242, 255, 0.2),
          0 0 80px rgba(46, 242, 255, 0.2),
          0 0 60px rgba(255, 79, 163, 0.18);
      }

      #avatar {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 100%;
        min-height: 320px;
        color: var(--muted);
      }

      #avatar img {
        width: min(100%, 240px);
        height: auto;
        image-rendering: pixelated;
        filter:
          drop-shadow(0 0 24px rgba(255, 79, 163, 0.35))
          drop-shadow(0 24px 40px rgba(0, 0, 0, 0.55));
      }

      #avatar img.avatar-pop {
        animation: avatar-pop 420ms cubic-bezier(.22, 1, .36, 1);
      }

      .footer {
        margin-top: 18px;
        display: grid;
        gap: 14px;
      }

      .seed {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        word-break: break-all;
      }

      .seed strong {
        color: var(--text);
      }

      .actions {
        display: flex;
        justify-content: center;
      }

      .button-wrap {
        position: relative;
        display: inline-grid;
        place-items: center;
      }

      #button-burst {
        position: absolute;
        inset: 50% auto auto 50%;
        width: 1px;
        height: 1px;
        pointer-events: none;
      }

      .button-spark {
        position: absolute;
        left: 0;
        top: 0;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: linear-gradient(135deg, var(--cyan), var(--yellow));
        box-shadow: 0 0 16px rgba(46, 242, 255, 0.45);
        transform: translate(-50%, -50%);
        opacity: 0;
        animation: spark-burst 620ms ease-out forwards;
        animation-delay: var(--spark-delay, 0ms);
      }

      button {
        appearance: none;
        position: relative;
        isolation: isolate;
        overflow: hidden;
        border: 0;
        padding: 14px 24px;
        border-radius: 16px;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: #120713;
        background: linear-gradient(135deg, var(--pink), var(--yellow));
        box-shadow:
          0 16px 42px rgba(255, 79, 163, 0.32),
          0 0 24px rgba(255, 79, 163, 0.24);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      }

      button::before {
        content: '';
        position: absolute;
        inset: -40% 30% auto auto;
        width: 100px;
        height: 220%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.65), transparent);
        transform: translateX(-180%) rotate(18deg);
        transition: transform 520ms ease;
        pointer-events: none;
        z-index: -1;
      }

      button:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow:
          0 22px 46px rgba(255, 79, 163, 0.36),
          0 0 32px rgba(46, 242, 255, 0.18);
      }

      button:hover::before,
      button.is-bursting::before {
        transform: translateX(280%) rotate(18deg);
      }

      button.is-bursting {
        animation: button-pulse 560ms ease;
      }

      button:active {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .hint {
        margin: 0;
        color: rgba(244, 247, 255, 0.48);
        font-size: 13px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      body.direct-avatar-mode {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 0;
        background: transparent;
      }

      body.direct-avatar-mode::before {
        display: none;
      }

      body.direct-avatar-mode img {
        display: block;
        width: min(100vw, 960px);
        height: auto;
        image-rendering: pixelated;
      }

      @keyframes float {
        0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
        50% { transform: translate3d(0, -20px, 0) rotate(12deg); }
      }

      @keyframes avatar-pop {
        0% {
          opacity: 0;
          transform: scale(0.72) rotate(-8deg);
          filter: drop-shadow(0 0 0 rgba(255, 79, 163, 0));
        }
        55% {
          opacity: 1;
          transform: scale(1.07) rotate(2deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      @keyframes button-pulse {
        0% { transform: scale(1); }
        40% { transform: scale(0.96); }
        70% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      @keyframes spark-burst {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.3);
        }
        15% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y))) scale(0.1) rotate(28deg);
        }
      }

      @keyframes card-glitch {
        0%, 100% { transform: translate3d(0, 0, 0); }
        15% { transform: translate3d(-3px, 0, 0); }
        30% { transform: translate3d(4px, -2px, 0); }
        45% { transform: translate3d(-4px, 2px, 0); }
        60% { transform: translate3d(3px, 0, 0); }
        75% { transform: translate3d(0, -2px, 0); }
      }

      @media (max-width: 640px) {
        .panel {
          padding: 18px;
          border-radius: 22px;
        }

        .avatar-card,
        #avatar {
          min-height: 260px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="pixel-field" aria-hidden="true">
        <span class="pixel" style="top: 12%; left: 10%; animation-duration: 10s;"></span>
        <span class="pixel" style="top: 18%; left: 84%; animation-duration: 12s;"></span>
        <span class="pixel" style="top: 28%; left: 18%; animation-duration: 9s;"></span>
        <span class="pixel" style="top: 34%; left: 76%; animation-duration: 11s;"></span>
        <span class="pixel" style="top: 46%; left: 8%; animation-duration: 13s;"></span>
        <span class="pixel" style="top: 52%; left: 88%; animation-duration: 10.5s;"></span>
        <span class="pixel" style="top: 68%; left: 16%; animation-duration: 12.5s;"></span>
        <span class="pixel" style="top: 74%; left: 78%; animation-duration: 9.5s;"></span>
      </div>

      <div class="orb orb-a" aria-hidden="true"></div>
      <div class="orb orb-b" aria-hidden="true"></div>

      <section class="shell">
        <header class="hero">
          <h1 class="title"><span data-text="Pixel Avatar">Pixel Avatar</span></h1>
        </header>

        <section class="panel">
          <div class="avatar-card" id="avatar-card">
            <div id="avatar">Generating avatar…</div>
          </div>

          <div class="footer">
            <p class="seed">Current seed: <strong id="seed-value">-</strong></p>
            <div class="actions">
              <div class="button-wrap">
                <div id="button-burst" aria-hidden="true"></div>
                <button id="random-button" type="button">Generate New Avatar</button>
              </div>
            </div>
            <p class="hint">Use the button to shuffle a new pixel face</p>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
